services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lobbyscope
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lobbyscope"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
